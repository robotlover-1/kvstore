# kvstore configuration file
# Lines use key=value format. Blank lines and lines starting with # are ignored.

port=5112
role=master
master_host=127.0.0.1
master_port=5000

dump_path=kvstore.dump
aof_path=kvstore.aof
mem_backend=libc
net_backend=reactor
appendfsync=always

# eBPF transport: repl_transport_backend=ebpf
#   --ebpf-redirect: BPF_F_INGRESS redirect (local optimization, requires --ebpf-pin)
#   --ebpf-forward:  egress redirect via sockmap TCP (cross-machine forwarding)
# Example: set ebpf_forward=1 in config or pass --ebpf-forward on CLI

# Format: seconds:changes,seconds:changes
# Example: autosnap=60:1000,300:10
autosnap=

sentinel=0
sentinel_master_name=mymaster
sentinel_monitor_host=127.0.0.1
sentinel_monitor_port=5000
sentinel_known_slaves=
sentinel_down_after_ms=5000
sentinel_failover_timeout_ms=10000
sentinel_quorum=1
