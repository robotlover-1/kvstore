# kvstore configuration file
#
# 用法:
#   ./kvstore kvstore.conf --role master
#   ./kvstore kvstore.conf --role slave
#
# 命令行参数会覆盖配置文件中的值。
# 配置文件中的 key=value 格式，# 开头为注释，空行被忽略。

# ── 通用设置 ──
port=5160
role=master
master_host=127.0.0.1
master_port=5160
dump_path=kvstore.dump
aof_path=kvstore.aof
mem_backend=libc
net_backend=reactor
log_mode=info
appendfsync=always

# ── 持久化（io_uring + mmap） ──
# 持久化使用 io_uring 进行 AOF 写入和 fsync
# 恢复使用 mmap 进行零拷贝加载，回退到 fread
# AOF fsync 策略: always / everysec

# ── 自动快照规则 ──
# 格式: seconds:changes,seconds:changes,...
# 示例: 60:1000 表示 60 秒内至少有 1000 次写入则触发自动快照
autosnap=

# ── 网络模型 ──
# reactor:    epoll 事件驱动（默认）
# proactor:   io_uring 异步读写
# ntyco:      NtyCo 协程
net_backend=reactor

# ── 内存后端 ──
# libc:      系统 malloc/free
# jemalloc:  jemalloc 内存分配器
# custom:    自定义 slab 分配器
mem_backend=libc

# ── 复制传输层 ──
# 全量同步（snapshot 传输）:
#   rdma  — RDMA SEND/RECV
#   tcp   — TCP 流
repl_fullsync_transport=rdma

# 增量同步（实时广播）:
#   ebpf+tcp      — eBPF kprobe 捕获客户端写入 → TCP 转发到 slave（推荐）
#   kprobe-rdma   — kprobe 捕获 TCP → ringbuf → RDMA WRITE
#   ebpf/sockmap  — eBPF sockmap 重定向
#   tcp           — TCP 流（保底，不使用 eBPF）
repl_realtime_transport=ebpf+tcp

# ── kprobe+RDMA 增量同步 ──
kprobe_enabled=1
repl_kprobe_obj_path=build/replication/bpf/repl_kprobe.bpf.o

# ── eBPF sockmap（kprobe 不可用时的回退方案） ──
ebpf_enabled=0
ebpf_obj_path=build/replication/bpf/repl_sockmap.bpf.o
ebpf_pin_path=/sys/fs/bpf/kvstore
ebpf_redirect=0
ebpf_redirect_key=0
ebpf_forward=0

# ── RDMA 设备 ──
rdma_dev=siw0
rdma_ib_port=1
rdma_gid_idx=1
rdma_port=0               # 0 = 自动: main port + 1
rdma_recv_slots=64
rdma_chunk_size=262144
rdma_qp_wr_depth=64

# ── Sentinel 哨兵 ──
sentinel=0
sentinel_master_name=mymaster
sentinel_monitor_host=192.168.233.128
sentinel_monitor_port=5160
sentinel_known_slaves=
sentinel_down_after_ms=5000
sentinel_failover_timeout_ms=10000
sentinel_quorum=1
