# kvstore configuration file
# key = value

# server
bind_ip = 0.0.0.0
port = 5000
role = master
master_host = 127.0.0.1
master_port = 5000

# persistence
dump_path = kvstore.dump
aof_path = kvstore.aof
appendfsync = always
autosnap =

# runtime backend
mem_backend = libc
net_backend = reactor
log_mode = console
persist_mode = aof

# sentinel
sentinel = false
sentinel_master_name = mymaster
sentinel_monitor_host = 127.0.0.1
sentinel_monitor_port = 5000
sentinel_known_slaves =
sentinel_down_after_ms = 5000
sentinel_failover_timeout_ms = 10000
sentinel_quorum = 1
