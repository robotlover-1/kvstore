# kvstore configuration file
# Lines use key=value format. Blank lines and lines starting with # are ignored.
# Command-line arguments override config file values.

# ---- 通用设置 ----
port=5113
role=master
#master_host=127.0.0.1
master_host=192.168.233.128
master_port=5000

dump_path=kvstore.dump
aof_path=kvstore.aof
mem_backend=libc
net_backend=reactor
log_mode=info
appendfsync=always

# ---- eBPF ----
# ebpf_enabled=0: eBPF 由独立进程管理（默认），kvstore 不加载 BPF 对象
# ebpf_enabled=1: kvstore 直接管理 eBPF（向后兼容）
# 独立进程: ./tools/ebpf/repl_ebpf_daemon -c kvstore-ebpf.conf
ebpf_enabled=0
#ebpf_obj_path=build/replication/bpf/repl_sockmap.bpf.o
#ebpf_pin_path=/sys/fs/bpf/kvstore

# ---- Replication Transport ----
# 默认使用 tcp，需要 RDMA/eBPF 时通过命令行覆盖：
#   --repl-fullsync-transport rdma --repl-realtime-transport ebpf
repl_transport_backend=tcp
repl_fullsync_transport=tcp
repl_realtime_transport=tcp

# ---- RDMA Transport（需要通过命令行或专门配置启用） ----
#rdma_dev=siw0
#rdma_port=0
#rdma_recv_slots=32
#rdma_chunk_size=16384
#rdma_qp_wr_depth=64

# ---- 自动快照 ----
autosnap=

# ---- Sentinel ----
sentinel=0
sentinel_master_name=mymaster
sentinel_monitor_host=192.168.233.128
sentinel_monitor_port=5000
sentinel_known_slaves=
sentinel_down_after_ms=5000
sentinel_failover_timeout_ms=10000
sentinel_quorum=1
