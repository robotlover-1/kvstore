# kvstore configuration file
# Lines use key=value format. Blank lines and lines starting with # are ignored.

port=5113
role=master
#master_host=127.0.0.1
master_host=192.168.233.128
master_port=5000

dump_path=kvstore.dump
aof_path=kvstore.aof
mem_backend=libc
net_backend=reactor
log_mode=info
appendfsync=always

# ---- Replication Transport ----
# Hybrid dual-transport mode (recommended):
#   repl_fullsync_transport=rdma   (bulk existing data sync via RDMA)
#   repl_realtime_transport=ebpf   (incremental real-time sync via eBPF sockmap)
# Legacy single-transport mode:
#   repl_transport_backend=tcp|rdma|ebpf
#
# When both repl_fullsync_transport and repl_realtime_transport are set,
# they take priority over repl_transport_backend for their respective contexts.
repl_fullsync_transport=rdma
repl_realtime_transport=ebpf

# eBPF transport: repl_transport_backend=ebpf
#   --ebpf-redirect: BPF_F_INGRESS redirect (local optimization, requires --ebpf-pin)
#   --ebpf-forward:  egress redirect via sockmap TCP (cross-machine forwarding)
# Example: set ebpf_forward=1 in config or pass --ebpf-forward on CLI

# Format: seconds:changes,seconds:changes
# Example: autosnap=60:1000,300:10
autosnap=

sentinel=0
sentinel_master_name=mymaster
sentinel_monitor_host=192.168.233.128
sentinel_monitor_port=5000
sentinel_known_slaves=
sentinel_down_after_ms=5000
sentinel_failover_timeout_ms=10000
sentinel_quorum=1
