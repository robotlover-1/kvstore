# test.conf — 测试配置文件
#
# 所有 C 测试程序均支持 --config <path> 加载此文件。
# 命令行参数（如 --port 5200）优先级高于配置文件。
#
# 用法:
#   ./test_repl_5w5w --config tests/test.conf
#   ./test_repl_gap --config tests/test.conf
#   ./test_mass_ttl --config tests/test.conf
#   ./test_kvstore --config tests/test.conf

# ── 通用连接（匹配 kvstore.conf 默认端口）──
host=192.168.233.128
port=5160

# ── 主从复制地址 ──
master_host=192.168.233.128
master_port=5160
slave_host=192.168.233.129
slave_port=5160

# ── 测试数据量 ──
# pre:   全量同步前预存数据（test_repl_5w5w --pre, test_repl_gap --pre-count）
# post:  全量同步后追加数据（test_repl_5w5w --post, test_repl_gap --post-count）
# gap:   全量同步期间手动写入的 gap 数据（test_repl_gap --gap-count）
# count: 通用测试数据量
pre=50000
post=50000
gap=0
count=10000

# ── 测试参数 ──
batch=1000
poll_ms=500
ttl=10
