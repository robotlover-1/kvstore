# test.conf — 测试配置文件
#
# 所有 C 测试程序均支持 --config <path> 加载此文件。
# 命令行参数（如 --port 5200）优先级高于配置文件。
#
# 用法:
#   ./test_kvstore --config tests/test.conf
#   ./test_mass_ttl --config tests/test.conf
#   ./test_batch --config tests/test.conf

# kvstore 服务地址
host=127.0.0.1

# kvstore 服务端口
port=5200

# 测试数据量
count=10000

# 每批写入量
batch=1000

# TTL 过期时间（秒）
ttl=10

# dump 文件路径（持久化测试用）
dump_path=kvstore.dump

# AOF 文件路径（持久化测试用）
aof_path=kvstore.aof
